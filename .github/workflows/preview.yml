name: Generate Link Previews

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  run-preview:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml
          
      - name: Run preview script and commit per file
        run: |
          git config --local user.email "122598293+sivasubramoniam-js@users.noreply.github.com"
          git config --local user.name "sivasubramoniam-js"
          for file in sites/*.csv; do
            echo "Processing $file"
            python preview.py "$file"
            git add previews/
            git commit -m "chore: auto-update link previews for $file [skip ci]" || echo "No changes to commit"
            git pull --rebase origin ${GITHUB_REF#refs/heads/}
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          done
        
      - name: Commit and push fallback changes
        if: always()
        run: |
          git config --local user.email "[EMAIL_ADDRESS]"
          git config --local user.name "sivasubramoniam-js"
          git add previews/
          git commit -m "chore: auto-update link previews (fallback) [skip ci]" || echo "No changes to commit"
          git pull --rebase origin ${GITHUB_REF#refs/heads/}
          git push origin HEAD:${GITHUB_REF#refs/heads/}
